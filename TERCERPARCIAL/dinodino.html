<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dinodino</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
body {
    background-color: #ffe5b4;
    text-align: center;
}

canvas {
    background: #fff3e0;
    display: block;
    margin: auto;
    border: 2px solid #ffb74d;
}
</style>
</head>

<body>

<h1>🦖 Dinodino</h1>

<p>Puntaje: <span id="score">0</span></p>

<canvas id="game" width="800" height="200"></canvas>

<div class="mt-3">
    <button class="btn btn-success" onclick="startGame()">Iniciar</button>
    <button class="btn btn-warning" onclick="pauseGame()">Pausar</button>
    <button class="btn btn-danger" onclick="restartGame()">Reiniciar</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let running = false;
let paused = false;

let dino = {
    x: 50,
    y: 140,
    w: 40,
    h: 30,
    dy: 0,
    jumping: false
};

const gravity = 0.8;
const jumpPower = -14;

let obstacles = [];
let score = 0;
let timer = 0;

// CONTROLES
document.addEventListener("keydown", e => {
    if ((e.code === "Space" || e.code === "ArrowUp") && !dino.jumping && running && !paused) {
        dino.dy = jumpPower;
        dino.jumping = true;
    }
});

// 🦖 DINO estilo emoji orientado a la derecha
function drawDino() {
    ctx.fillStyle = "#2e7d32";

    // cola (atrás)
    ctx.fillRect(dino.x, dino.y + 10, 10, 10);

    // cuerpo
    ctx.fillRect(dino.x + 10, dino.y, 20, 20);

    // cabeza (mirando a la derecha)
    ctx.fillRect(dino.x + 25, dino.y - 5, 15, 15);

    // ojo
    ctx.fillStyle = "white";
    ctx.fillRect(dino.x + 35, dino.y, 3, 3);

    // patas
    ctx.fillStyle = "#2e7d32";
    ctx.fillRect(dino.x + 12, dino.y + 20, 5, 10);
    ctx.fillRect(dino.x + 22, dino.y + 20, 5, 10);
}

// OBSTÁCULOS
function createObstacle() {
    const types = ["rock","tree","cactus"];
    const type = types[Math.floor(Math.random()*types.length)];

    let o;

    if (type === "rock") o = {x:800,y:170,w:25,h:20,type};
    if (type === "cactus") o = {x:800,y:150,w:20,h:40,type};
    if (type === "tree") o = {x:800,y:120,w:30,h:70,type};

    obstacles.push(o);
}

function drawObstacles() {
    obstacles.forEach(o => {
        if (o.type==="rock") {
            ctx.fillStyle="#6d4c41";
            ctx.fillRect(o.x,o.y,o.w,o.h);
        }

        if (o.type==="cactus") {
            ctx.fillStyle="#388e3c";
            ctx.fillRect(o.x,o.y,o.w,o.h);
        }

        if (o.type==="tree") {
            ctx.fillStyle="#5d4037";
            ctx.fillRect(o.x+10,o.y+40,10,30);

            ctx.fillStyle="#2e7d32";
            ctx.beginPath();
            ctx.arc(o.x+15,o.y+30,20,0,Math.PI*2);
            ctx.fill();
        }
    });
}

// LOOP
function update() {
    if (!running || paused) return;

    ctx.clearRect(0,0,canvas.width,canvas.height);

    // física
    dino.y += dino.dy;
    dino.dy += gravity;

    if (dino.y >= 140) {
        dino.y = 140;
        dino.dy = 0;
        dino.jumping = false;
    }

    drawDino();

    // separación controlada
    timer++;
    if (timer > 100) {
        createObstacle();
        timer = 0;
    }

    obstacles.forEach(o => o.x -= 6);
    drawObstacles();

    // colisión
    obstacles.forEach(o => {
        if (
            dino.x < o.x + o.w &&
            dino.x + dino.w > o.x &&
            dino.y < o.y + o.h &&
            dino.y + dino.h > o.y
        ) {
            gameOver();
        }
    });

    obstacles = obstacles.filter(o => o.x > -50);

    score++;
    document.getElementById("score").textContent = score;

    requestAnimationFrame(update);
}

// CONTROLES
function startGame() {
    if (running) return;

    running = true;
    paused = false;

    Swal.fire("Iniciado", "¡A jugar! 🦖", "success");
    update();
}

function pauseGame() {
    paused = !paused;

    Swal.fire(
        paused ? "Pausado" : "Reanudado",
        paused ? "⏸️ Juego detenido" : "▶️ Continuando",
        "info"
    );

    if (!paused) update();
}

function restartGame() {
    running = false;
    paused = false;

    dino.y = 140;
    dino.dy = 0;
    obstacles = [];
    score = 0;
    timer = 0;

    ctx.clearRect(0,0,canvas.width,canvas.height);

    Swal.fire("Reiniciado", "Todo limpio 🔄", "warning");
}

function gameOver() {
    running = false;

    Swal.fire("Game Over", "Puntaje: " + score, "error");
}
</script>

</body>
