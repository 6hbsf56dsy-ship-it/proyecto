<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Crucigrama - Colores</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
body{
background: linear-gradient(135deg, #ff9a9e, #fecfef);
text-align:center;
}

.grid{
display:grid;
grid-template-columns:repeat(12,45px);
gap:5px;
justify-content:center;
margin-top:20px;
}

.cell{
width:45px;
height:45px;
position:relative;
}

input{
width:100%;
height:100%;
text-align:center;
font-weight:bold;
text-transform:uppercase;
border-radius:5px;
}

.block{
background:black;
}

.number{
position:absolute;
top:2px;
left:4px;
font-size:10px;
font-weight:bold;
color:black;
}

.correct{ background:lightgreen; }
.wrong{ background:#ff6b6b; }

.box{
background:white;
border-radius:10px;
padding:15px;
}
</style>
</head>

<body class="container py-4">

<h1>🎨 Crucigrama de Colores</h1>

<div class="row mt-4">

<!-- GRID -->
<div class="col-md-7">
<div class="grid" id="grid"></div>
</div>

<!-- PISTAS -->
<div class="col-md-5">
<div class="box text-start">

<h5>➡️ Horizontales</h5>
<ul>
<li>1. Color del cielo</li>
<li>2. Color de la naturaleza</li>
<li>3. Color del fuego</li>
<li>4. Color del sol</li>
<li>5. Color de la noche</li>
<li>6. Color romántico</li>
</ul>

<h5 class="mt-3">⬇️ Verticales</h5>
<ul>
<li>7. Color de la nieve</li>
<li>8. Color de las uvas</li>
</ul>

<button class="btn btn-success mt-3 w-100" onclick="verificar()">Verificar</button>
<button class="btn btn-primary mt-2 w-100" onclick="guardar()">Guardar</button>

</div>
</div>

</div>

<script>

// palabras con número
const palabras = [
{num:1, word:"AZUL", row:0, col:0, dir:"H"},
{num:2, word:"VERDE", row:2, col:0, dir:"H"},
{num:3, word:"ROJO", row:4, col:0, dir:"H"},
{num:4, word:"AMARILLO", row:6, col:0, dir:"H"},
{num:5, word:"NEGRO", row:8, col:0, dir:"H"},
{num:6, word:"ROSA", row:10, col:0, dir:"H"},
{num:7, word:"BLANCO", row:0, col:7, dir:"V"},
{num:8, word:"MORADO", row:0, col:10, dir:"V"}
];

const rows=12, cols=12;
let grid = Array.from({length:rows},()=>Array(cols).fill(""));

// colocar palabras
palabras.forEach(p=>{
for(let i=0;i<p.word.length;i++){
if(p.dir=="H"){
grid[p.row][p.col+i]=p.word[i];
}else{
grid[p.row+i][p.col]=p.word[i];
}
}
});

// dibujar
const cont=document.getElementById("grid");

for(let i=0;i<rows;i++){
for(let j=0;j<cols;j++){
let div=document.createElement("div");
div.className="cell";

let palabraInicio = palabras.find(p=>p.row==i && p.col==j);
if(palabraInicio){
let num=document.createElement("div");
num.className="number";
num.innerText=palabraInicio.num;
div.appendChild(num);
}

if(grid[i][j]==""){
div.classList.add("block");
}else{
let inp=document.createElement("input");
inp.maxLength=1;
inp.dataset.letra=grid[i][j];
div.appendChild(inp);
}

cont.appendChild(div);
}
}

// verificar
function verificar(){
let inputs=document.querySelectorAll("input");
let correctos=0;

inputs.forEach(i=>{
if(i.value.toUpperCase()==i.dataset.letra){
i.classList.add("correct");
i.classList.remove("wrong");
correctos++;
}else{
i.classList.add("wrong");
i.classList.remove("correct");
}
});

if(correctos===inputs.length){
Swal.fire("¡Crucigrama completo! 🎉");
}else{
Swal.fire("Hay errores 😅");
}
}

// guardar
function guardar(){
let valores=[];
document.querySelectorAll("input").forEach(i=>{
valores.push(i.value);
});
localStorage.setItem("crucigrama", JSON.stringify(valores));
Swal.fire("Guardado correctamente");
}

</script>

</body>
</html>
