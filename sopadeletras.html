<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sopa de Letras - Animales</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- SweetAlert -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
body{
background: linear-gradient(135deg, #4facfe, #00f2fe);
color:white;
text-align:center;
}

.grid{
display:grid;
grid-template-columns:repeat(15,35px);
gap:4px;
justify-content:center;
margin-top:20px;
}

.cell{
width:35px;
height:35px;
background:white;
color:black;
font-weight:bold;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
border-radius:5px;
}

.cell.selected{
background:yellow;
}

.cell.found{
background:limegreen;
color:white;
}

.word-box{
background:white;
color:black;
border-radius:10px;
padding:15px;
}

.found-word{
text-decoration:line-through;
color:green;
}
</style>
</head>

<body class="container py-4">

<h1>🐾 Sopa de Letras - Animales</h1>

<div class="row mt-4">

<!-- SOPA -->
<div class="col-md-8">
<div class="grid" id="grid"></div>
</div>

<!-- LISTA -->
<div class="col-md-4">
<div class="word-box">
<h4>Palabras</h4>
<ul id="lista"></ul>
<button class="btn btn-success mt-3" onclick="guardar()">Guardar</button>
</div>
</div>

</div>

<script>

const palabras = ["GATO","PERRO","LEON","TIGRE","ELEFANTE","CABALLO","MONO"];
const letras = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
const size = 15;

let gridArray = [];

// crear grid vacío
for(let i=0;i<size;i++){
gridArray[i]=[];
for(let j=0;j<size;j++){
gridArray[i][j]="";
}
}

// colocar palabras horizontalmente
palabras.forEach(p=>{
let fila = Math.floor(Math.random()*size);
let col = Math.floor(Math.random()*(size-p.length));

for(let i=0;i<p.length;i++){
gridArray[fila][col+i]=p[i];
}
});

// rellenar con letras aleatorias
for(let i=0;i<size;i++){
for(let j=0;j<size;j++){
if(gridArray[i][j]==""){
gridArray[i][j]=letras[Math.floor(Math.random()*letras.length)];
}
}
}

// dibujar grid
const grid = document.getElementById("grid");

for(let i=0;i<size;i++){
for(let j=0;j<size;j++){
let div=document.createElement("div");
div.className="cell";
div.innerText=gridArray[i][j];

div.onclick=()=>{
div.classList.toggle("selected");
verificar();
};

grid.appendChild(div);
}
}

// lista de palabras
const lista = document.getElementById("lista");
palabras.forEach(p=>{
let li=document.createElement("li");
li.innerText=p;
li.id="word-"+p;
lista.appendChild(li);
});

// verificar selección
function verificar(){
let seleccion = Array.from(document.querySelectorAll(".selected")).map(c=>c.innerText).join("");

palabras.forEach(p=>{
if(seleccion.includes(p)){
document.getElementById("word-"+p).classList.add("found-word");

document.querySelectorAll(".selected").forEach(c=>{
c.classList.remove("selected");
c.classList.add("found");
});

Swal.fire("Encontraste: " + p);
}
});
}

// guardar progreso
function guardar(){
let found = document.querySelectorAll(".found-word").length;
localStorage.setItem("progresoSopa", found);
Swal.fire("Progreso guardado!");
}

</script>

</body>
</html>
