<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Quiz Disney</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
body{
background: linear-gradient(135deg, #d9a7ff, #fffcdc);
text-align:center;
}

.card{
border-radius:15px;
}

.correct{
background:#c8f7c5;
}

.wrong{
background:#f7c5c5;
}
</style>
</head>

<body class="container py-4">

<h1>💜 Cuestionario Disney</h1>

<div id="quiz" class="mt-4"></div>

<button class="btn btn-primary mt-3" onclick="verificar()">Verificar respuestas</button>

<script>

const preguntas = [
{q:"¿Cómo se llama el ratón famoso de Disney?",op:["Mickey Mouse","Bugs Bunny","Tom","Jerry"],correcta:0},
{q:"¿En qué película aparece Elsa?",op:["Moana","Frozen","Cenicienta","Rapunzel"],correcta:1},
{q:"¿Cómo se llama el pez de Nemo?",op:["Dory","Marlin","Nemo","Bruce"],correcta:2},
{q:"¿Qué princesa pierde su zapato?",op:["Ariel","Bella","Cenicienta","Tiana"],correcta:2},
{q:"¿Quién es el genio de la lámpara?",op:["Aladdin","Genio","Jafar","Abu"],correcta:1},
{q:"¿Cómo se llama el león rey?",op:["Simba","Mufasa","Scar","Nala"],correcta:0},
{q:"¿Qué animal es Dumbo?",op:["Elefante","Ratón","Perro","Caballo"],correcta:0},
{q:"¿Quién roba la voz de Ariel?",op:["Úrsula","Maléfica","Cruella","Jafar"],correcta:0},
{q:"¿Qué princesa tiene cabello mágico largo?",op:["Elsa","Rapunzel","Aurora","Bella"],correcta:1},
{q:"¿Quién es el villano en El Rey León?",op:["Scar","Simba","Timon","Pumba"],correcta:0}
];

const quizDiv = document.getElementById("quiz");

// generar preguntas
preguntas.forEach((p,i)=>{
let div=document.createElement("div");
div.className="card p-3 mb-3 text-start";
div.id="card"+i;

let html = `<p><b>${i+1}. ${p.q}</b></p>`;

p.op.forEach((op,j)=>{
html += `
<div class="form-check">
<input class="form-check-input" type="radio" name="q${i}" value="${j}">
<label class="form-check-label">${op}</label>
</div>`;
});

div.innerHTML = html;
quizDiv.appendChild(div);
});

// verificar
function verificar(){

let puntos=0;

preguntas.forEach((p,i)=>{
let seleccion = document.querySelector(`input[name="q${i}"]:checked`);
let card = document.getElementById("card"+i);

card.classList.remove("correct","wrong");

if(seleccion){
if(parseInt(seleccion.value)===p.correcta){
puntos++;
card.classList.add("correct");
}else{
card.classList.add("wrong");
}
}else{
card.classList.add("wrong");
}
});

// guardar
sessionStorage.setItem("resultadoDisney", puntos);

// resultado
Swal.fire({
title:"Resultado",
text:`Sacaste ${puntos} de ${preguntas.length}`,
icon: puntos>=7 ? "success" : "warning"
});

}

</script>

</body>
</html>
